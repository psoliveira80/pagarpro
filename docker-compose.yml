services:
  db:
    container_name: frotauber-db
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    container_name: frotauber-redis
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    container_name: frotauber-minio
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 3

  api:
    container_name: frotauber-api
    build: ./src/backend-api
    env_file: ./src/backend-api/.env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8100:8000"
    volumes:
      - ./src/backend-api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    container_name: frotauber-worker
    build: ./src/backend-api
    env_file: ./src/backend-api/.env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./src/backend-api:/app
    command: celery -A app.workers worker -Q default,high,low,events,agent,ocr -l info
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers inspect ping --timeout 5 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  beat:
    container_name: frotauber-beat
    build: ./src/backend-api
    env_file: ./src/backend-api/.env.example
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend-api:/app
    command: celery -A app.workers beat -l info
    healthcheck:
      disable: true

volumes:
  pgdata: {}
  miniodata: {}
