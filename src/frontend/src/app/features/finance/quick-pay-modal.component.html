<app-modal [open]="open()" (closed)="closed.emit()" size="md" title="Pagamento Rápido">
  <!-- Body -->
  <div class="space-y-4">
    <div>
      <label for="qp-description" class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">Descrição</label>
      <input
        id="qp-description"
        type="text"
        [value]="description()"
        (input)="description.set($any($event.target).value)"
        placeholder="Ex: Combustível"
        class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-4 py-2.5 text-sm text-[var(--text-primary)] placeholder-[var(--text-muted)] focus:border-[var(--accent)] focus:outline-none transition"
      />
    </div>

    <div>
      <label for="qp-supplier" class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">Fornecedor</label>
      <div class="relative">
        <input
          id="qp-supplier"
          type="text"
          [value]="supplierSearch()"
          (input)="searchSuppliers($any($event.target).value)"
          placeholder="Buscar fornecedor..."
          class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-4 py-2.5 text-sm text-[var(--text-primary)] placeholder-[var(--text-muted)] focus:border-[var(--accent)] focus:outline-none transition"
        />
        @if (supplierResults().length > 0) {
          <div class="absolute z-10 mt-1 w-full rounded-xl border border-[var(--border)] bg-[var(--surface-elevated)] shadow-lg">
            @for (s of supplierResults(); track s.id) {
              <button
                (click)="selectSupplier(s)"
                class="w-full px-4 py-2.5 text-left text-sm text-[var(--text-primary)] hover:bg-[var(--border-subtle)] first:rounded-t-xl last:rounded-b-xl transition cursor-pointer"
              >
                {{ s.nome }}
              </button>
            }
          </div>
        }
      </div>
    </div>

    <div>
      <label for="qp-category" class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">Categoria</label>
      <app-select
        [options]="categoryOptions()"
        [(value)]="categoryId"
        placeholder="Selecione..."
      />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="qp-amount" class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">Valor (R$)</label>
        <input
          id="qp-amount"
          type="number"
          [value]="amount()"
          (input)="amount.set(+$any($event.target).value)"
          min="0"
          step="0.01"
          class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-4 py-2.5 text-sm text-[var(--text-primary)] focus:border-[var(--accent)] focus:outline-none transition"
        />
      </div>
      <div>
        <label for="qp-date" class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">Data</label>
        <input
          id="qp-date"
          type="date"
          [value]="date()"
          (input)="date.set($any($event.target).value)"
          class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-4 py-2.5 text-sm text-[var(--text-primary)] focus:border-[var(--accent)] focus:outline-none transition"
        />
      </div>
    </div>

    <div>
      <label for="qp-method" class="block text-sm font-medium text-[var(--text-secondary)] mb-1.5">Método</label>
      <app-select
        [options]="methodOptions"
        [(value)]="method"
        placeholder="Método"
      />
    </div>
  </div>

  <!-- Footer -->
  <div modal-footer class="flex items-center justify-end gap-3 border-t border-[var(--border)] px-6 py-4">
    <button
      (click)="close()"
      class="rounded-xl border border-[var(--border)] px-4 py-2.5 text-sm font-medium text-[var(--text-secondary)] hover:bg-[var(--border-subtle)] transition cursor-pointer"
    >
      Cancelar
    </button>
    <button
      (click)="submit()"
      [disabled]="isSaving() || !description() || !supplierId() || !categoryId() || amount() <= 0"
      class="rounded-xl bg-[var(--accent)] px-4 py-2.5 text-sm font-medium text-white hover:opacity-90 transition disabled:opacity-40 cursor-pointer"
    >
      @if (isSaving()) {
        Salvando...
      } @else {
        Pagar Agora
      }
    </button>
  </div>
</app-modal>
