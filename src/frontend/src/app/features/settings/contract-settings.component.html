<div class="space-y-6">
  <!-- Header -->
  <div>
    <h2 class="text-2xl font-bold text-[var(--text-primary)]">Configurações de Contratos</h2>
    <p class="text-sm text-[var(--text-muted)] mt-1">Valores padrão para criação de contratos e parcelas</p>
  </div>

  @if (isLoading()) {
    <div class="rounded-2xl border border-[var(--border)] bg-[var(--surface-elevated)] p-6 animate-pulse space-y-4">
      @for (i of [1, 2, 3]; track i) {
        <div class="h-10 bg-[var(--border-subtle)] rounded-xl"></div>
      }
    </div>
  } @else {
    <div class="rounded-2xl border border-[var(--border)] bg-[var(--surface-elevated)] p-6 space-y-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="ct-frequency" class="block text-sm font-medium text-[var(--text-secondary)] mb-1">
            Frequência Padrão <span class="text-[var(--danger)]">*</span>
          </label>
          <select
            id="ct-frequency"
            [value]="defaultFrequency()"
            (change)="defaultFrequency.set($any($event.target).value)"
            class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-3 py-2.5 text-sm text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)]/50"
          >
            <option value="semanal">Semanal</option>
            <option value="quinzenal">Quinzenal</option>
            <option value="mensal">Mensal</option>
            <option value="bimestral">Bimestral</option>
            <option value="trimestral">Trimestral</option>
          </select>
        </div>
        <div>
          <label for="ct-payment" class="block text-sm font-medium text-[var(--text-secondary)] mb-1">
            Método de Pagamento Padrão
          </label>
          <select
            id="ct-payment"
            [value]="defaultPaymentMethod()"
            (change)="defaultPaymentMethod.set($any($event.target).value)"
            class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-3 py-2.5 text-sm text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)]/50"
          >
            <option value="pix">PIX</option>
            <option value="boleto">Boleto</option>
            <option value="transferencia">Transferência</option>
            <option value="dinheiro">Dinheiro</option>
          </select>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label for="ct-duration" class="block text-sm font-medium text-[var(--text-secondary)] mb-1">
            Duração Padrão (meses)
          </label>
          <input
            id="ct-duration"
            type="number"
            min="1"
            [value]="defaultContractDurationMonths()"
            (input)="defaultContractDurationMonths.set($any($event.target).value)"
            class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-3 py-2.5 text-sm text-[var(--text-primary)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)]/50"
          />
        </div>
        <div class="flex items-center gap-3 pt-6">
          <button
            (click)="toggleAutoGenerate()"
            [class.bg-[var(--accent)]]="autoGenerateInstallments()"
            [class.bg-[var(--border)]]="!autoGenerateInstallments()"
            class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors cursor-pointer"
            role="switch"
            [attr.aria-checked]="autoGenerateInstallments()"
          >
            <span
              [class.translate-x-6]="autoGenerateInstallments()"
              [class.translate-x-1]="!autoGenerateInstallments()"
              class="inline-block h-4 w-4 rounded-full bg-white transition-transform"
            ></span>
          </button>
          <span class="text-sm font-medium text-[var(--text-secondary)]">
            Gerar parcelas automaticamente ao ativar contrato
          </span>
        </div>
      </div>

      <!-- Clauses Template -->
      <div>
        <label for="ct-clauses" class="block text-sm font-medium text-[var(--text-secondary)] mb-1">
          Template de Cláusulas
        </label>
        <textarea
          id="ct-clauses"
          [value]="clausesTemplate()"
          (input)="clausesTemplate.set($any($event.target).value)"
          rows="8"
          placeholder="Insira as cláusulas padrão que serão usadas em novos contratos..."
          class="w-full rounded-xl border border-[var(--border)] bg-[var(--surface)] px-3 py-2.5 text-sm text-[var(--text-primary)] placeholder:text-[var(--text-muted)] focus:outline-none focus:ring-2 focus:ring-[var(--accent)]/50"
        ></textarea>
      </div>

      <!-- Save -->
      <div class="flex justify-end pt-4 border-t border-[var(--border)]">
        <button
          (click)="save()"
          [disabled]="isSaving()"
          class="flex items-center gap-2 rounded-xl bg-[var(--accent)] px-6 py-2.5 text-sm font-medium text-white hover:opacity-90 transition cursor-pointer disabled:opacity-50"
        >
          @if (isSaving()) {
            <div class="animate-spin h-4 w-4 border-2 border-white border-t-transparent rounded-full"></div>
          }
          Salvar
        </button>
      </div>
    </div>
  }
</div>
