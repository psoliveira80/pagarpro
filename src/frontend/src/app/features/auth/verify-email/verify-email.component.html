<div class="flex h-full items-center justify-center bg-gradient-to-br from-[var(--accent)] to-[var(--accent-hover)] p-4">
  <app-toast />

  <div class="w-full max-w-md">
    <div class="backdrop-blur-md bg-white/10 border border-white/20 shadow-2xl rounded-2xl p-8 md:p-10">
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-white tracking-tight">{{ productName }}</h1>
        <p class="text-white/60 text-sm mt-1">Verificação de e-mail</p>
      </div>

      @if (isLoading()) {
        <div class="text-center text-white space-y-4">
          <svg class="animate-spin h-8 w-8 mx-auto text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <p class="text-white/70">Verificando...</p>
        </div>
      }

      @if (success()) {
        <div class="text-center text-white space-y-4">
          <div class="flex justify-center mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-green-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
          </div>
          <h2 class="text-xl font-semibold">E-mail verificado!</h2>
          <p class="text-white/70 text-sm">Sua conta foi ativada. Redirecionando para o login...</p>
        </div>
      }

      @if (errorMessage()) {
        <div class="text-center text-white space-y-4">
          <div class="flex justify-center mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-red-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
          </div>
          <h2 class="text-xl font-semibold">Erro na verificação</h2>
          <p class="text-white/70 text-sm">{{ errorMessage() }}</p>
          <a
            routerLink="/auth/resend-verification"
            class="inline-block mt-2 text-sm text-white/60 hover:text-white/90 transition-colors underline underline-offset-2"
          >
            Reenviar e-mail de verificação
          </a>
        </div>
      }

      <div class="text-center mt-6">
        <a
          routerLink="/auth/login"
          class="text-sm text-white/60 hover:text-white/90 transition-colors underline underline-offset-2"
        >
          Voltar ao login
        </a>
      </div>
    </div>
  </div>
</div>
