<div class="space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
    <h2 class="text-2xl font-semibold">Relatórios</h2>
    <button
      (click)="openBuilder()"
      class="flex items-center gap-2 rounded-xl bg-[var(--accent)] px-4 py-2 text-sm font-medium text-white hover:opacity-90 transition cursor-pointer"
    >
      <ui-icon name="heroPlus" size="1rem" />
      Relatório Personalizado
    </button>
  </div>

  <!-- Built-in Reports -->
  <div>
    <h3 class="text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-3">Relatórios Pré-definidos</h3>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
      @for (report of builtInReports; track report.slug) {
        <button
          (click)="openReport(report.slug)"
          class="rounded-xl border border-[var(--border)] bg-[var(--surface-elevated)] p-5 text-left hover:border-[var(--accent)] transition group cursor-pointer"
        >
          <div class="flex items-center gap-3 mb-3">
            <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-[var(--accent)]/10 text-[var(--accent)] group-hover:bg-[var(--accent)]/20 transition">
              <ui-icon [name]="report.icon" size="1.25rem" />
            </div>
          </div>
          <h4 class="text-sm font-semibold text-[var(--text-primary)] mb-1">{{ report.name }}</h4>
          <p class="text-xs text-[var(--text-muted)] line-clamp-2">{{ report.description }}</p>
        </button>
      }
    </div>
  </div>

  <!-- Saved Reports -->
  @if (savedReports().length > 0) {
    <div>
      <h3 class="text-sm font-semibold text-[var(--text-muted)] uppercase tracking-wider mb-3">Relatórios Salvos</h3>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
        @for (report of savedReports(); track report.id) {
          <button
            (click)="openBuilder()"
            class="rounded-xl border border-[var(--border)] bg-[var(--surface-elevated)] p-5 text-left hover:border-[var(--accent)] transition cursor-pointer"
          >
            <h4 class="text-sm font-semibold text-[var(--text-primary)] mb-1">{{ report.name }}</h4>
            <p class="text-xs text-[var(--text-muted)]">{{ report.description || 'Relatório personalizado' }}</p>
            <div class="flex items-center gap-2 mt-2">
              @if (report.is_shared) {
                <span class="text-[10px] px-1.5 py-0.5 rounded bg-blue-500/20 text-blue-400">Compartilhado</span>
              }
              <span class="text-[10px] text-[var(--text-muted)]">{{ report.criado_em }}</span>
            </div>
          </button>
        }
      </div>
    </div>
  }
</div>
