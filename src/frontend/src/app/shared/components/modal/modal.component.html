@if (open()) {
  <!-- eslint-disable-next-line @angular-eslint/template/click-events-have-key-events, @angular-eslint/template/interactive-supports-focus -->
  <div
    class="fixed inset-0 z-[1300] flex items-center justify-center bg-black/50 p-4 animate-modal-backdrop"
    (click)="onBackdropClick($event)"
  >
    <div
      #modalPanel
      tabindex="-1"
      class="w-full rounded-2xl bg-[var(--surface-elevated)] shadow-2xl overflow-hidden animate-modal-panel outline-none flex flex-col max-h-[90vh]"
      [class]="sizeClass"
    >
      <!-- Header (only if title provided) -->
      @if (title()) {
        <div class="flex items-center justify-between px-6 py-4 border-b border-[var(--border)]">
          <h3 class="text-lg font-semibold text-[var(--text-primary)]">{{ title() }}</h3>
          @if (showClose()) {
            <button
              (click)="close()"
              class="flex items-center justify-center rounded-lg p-1.5 text-[var(--text-muted)] hover:text-[var(--text-primary)] transition cursor-pointer"
            >
              <ui-icon name="heroXMark" size="1.25rem" />
            </button>
          }
        </div>
      }

      <!-- Body (projected content) -->
      <div class="flex-1 overflow-auto p-6">
        <ng-content />
      </div>

      <!-- Footer (optional projected content) -->
      <ng-content select="[modal-footer]" />
    </div>
  </div>
}
